<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Fleet Management - Advanced Filter</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 24px; }
        .header { background: white; border-radius: 12px; padding: 24px 32px; margin-bottom: 24px; border-left: 5px solid #ecf542; }
        .card-row { display: flex; gap: 16px; flex-wrap: wrap; }
        .card { background: white; border-radius: 12px; padding: 24px; flex: 1; min-width: 150px; }
        .card-label { font-size: 13px; color: #64748b; margin-bottom: 8px; }
        .card-value { font-size: 28px; font-weight: bold; color: #1e3a5f; }
        .card-blue { background: #2563eb; color: white; }
        .card-blue .card-label, .card-blue .card-value { color: white; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        th { background: #1e3a5f; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .filter-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .filter-group { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .group-label { font-weight: bold; min-width: 100px; color: #475569; }
        
        button { padding: 8px 12px; cursor: pointer; border-radius: 6px; border: 1px solid #cbd5e1; background: white; transition: 0.2s; }
        button:hover { background: #f1f5f9; border-color: #94a3b8; }
        button.active { background: #2563eb; color: white; border-color: #2563eb; }
        .month-btn { min-width: 55px; font-size: 13px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body>

    <div class="header">
        <h1>Fleet Management Dashboard</h1>
        <p>วิเคราะห์ข้อมูลการซ่อมบำรุงรายปี/เดือน</p>
    </div>

    <div class="card-row">
        <div class="card card-blue"><div class="card-label">ค่าซ่อมรวม (ช่วงที่เลือก)</div><div class="card-value" id="totalcost">฿ 0</div></div>
        <div class="card"><div class="card-label">จำนวนครั้งที่ซ่อม</div><div class="card-value" id="totalrepaired">0 ครั้ง</div></div>
        <div class="card"><div class="card-label">ซ่อมฉุกเฉิน BM</div><div class="card-value" id="BreakdownRepaired">0</div></div>
        <div class="card"><div class="card-label">ซ่อมป้องกัน PM</div><div class="card-value" id="PreventiveRepaired">0</div></div>
        <div class="card"><div class="card-label">ซ่อมแก้ไข CM</div><div class="card-value" id="CorrectiveRepaired">0</div></div>
    </div>

    <div class="filter-section" style="margin-top: 24px;">
        <h3>ตัวกรองข้อมูลอัจฉริยะ</h3>
        
        <div class="filter-group">
            <span class="group-label">เลือกปี (ค.ศ.):</span>
            <div id="yearButtons">
                <button class="year-btn active" onclick="selectYear(2024, this)">2024</button>
                <button class="year-btn" onclick="selectYear(2025, this)">2025</button>
                <button class="year-btn" onclick="selectYear(2026, this)">2026</button>
                <button class="year-btn" onclick="selectYear(999, this)">ทั้งหมด</button>
            </div>
        </div>

        <div id="subFilters">
            <div class="filter-group">
                <span class="group-label">ช่วงเวลาพิเศษ:</span>
                <button onclick="filterRange('all')">ทั้งปี</button>
                <button onclick="filterRange('h1')">ครึ่งปีแรก (ม.ค.-มิ.ย.)</button>
                <button onclick="filterRange('h2')">ครึ่งปีหลัง (ก.ค.-ธ.ค.)</button>
                <button onclick="filterRange('q1')">Q1</button>
                <button onclick="filterRange('q2')">Q2</button>
                <button onclick="filterRange('q3')">Q3</button>
                <button onclick="filterRange('q4')">Q4</button>
            </div>

            <div class="filter-group">
                <span class="group-label">เลือกรายเดือน:</span>
                <div id="monthButtons">
                    <script>
                        const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
                        months.forEach((m, i) => {
                            document.write(`<button class="month-btn" onclick="filterMonth(${i})">${m}</button>`);
                        });
                    </script>
                </div>
            </div>
        </div>
    </div>

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 300px; max-width: 500px; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <canvas id="systemChart"></canvas>
        </div>
        <div style="flex: 2; min-width: 400px; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <h3 id="tableTitle">สรุปรายทะเบียน</h3>
            <table id="vehicleTable">
                <thead>
                    <tr><th>ทะเบียนรถ</th><th style="text-align:center">ครั้ง</th><th>ค่าอะไหล่</th><th>ค่าแรง</th><th>ยอดรวม</th></tr>
                </thead>
                <tbody id="vehicleTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQwq0XY49ZzCMIDubKmAoCpaech2r-tSuFcZXZWKW7mVYO8gnjw5q7XHvOeyApOcY-ZZ9gJGcYTo8rH/pub?output=csv';
        let rawData = [];
        let currentYear = 2024;
        let myChart = null;

        function cleanNumber(v) { return v ? parseFloat(String(v).replace(/[^0-9.]/g, '')) || 0 : 0; }
        
        function parseThaiDate(dateStr) {
            if (!dateStr) return new Date(0);
            let p = dateStr.split('/');
            let y = parseInt(p[2]);
            if (y > 2500) y -= 543;
            return new Date(y, parseInt(p[1]) - 1, parseInt(p[0]));
        }

        function selectYear(year, btn) {
            currentYear = year;
            document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // ซ่อนปุ่มเดือนถ้าเลือก "ทั้งหมด"
            document.getElementById('subFilters').style.opacity = (year === 999) ? "0.3" : "1";
            document.getElementById('subFilters').style.pointerEvents = (year === 999) ? "none" : "auto";

            if(year === 999) renderDashboard(rawData);
            else filterRange('all');
        }

        function filterMonth(monthIdx) {
            let filtered = rawData.filter(row => {
                let d = parseThaiDate(row["วันที่ซ่อมเสร็จ"]);
                return d.getFullYear() === currentYear && d.getMonth() === monthIdx;
            });
            renderDashboard(filtered);
        }

        function filterRange(type) {
            let filtered = rawData.filter(row => {
                let d = parseThaiDate(row["วันที่ซ่อมเสร็จ"]);
                if (d.getFullYear() !== currentYear) return false;
                let m = d.getMonth();
                if (type === 'all') return true;
                if (type === 'h1') return m <= 5;
                if (type === 'h2') return m >= 6;
                if (type === 'q1') return m <= 2;
                if (type === 'q2') return m >= 3 && m <= 5;
                if (type === 'q3') return m >= 6 && m <= 8;
                if (type === 'q4') return m >= 9;
                return false;
            });
            renderDashboard(filtered);
        }

        function renderDashboard(data) {
            let totalCost = 0, BM = 0, PM = 0, CM = 0;
            let systemStats = {}, vehicleData = {};

            data.forEach(row => {
                let parts = cleanNumber(row["ค่าอะไหล่"]), labor = cleanNumber(row["ค่าแรง"]), cost = parts + labor;
                totalCost += cost;
                let type = row["ประเภทการซ่อม"] || "";
                if (type.includes("BM")) BM++; else if (type.includes("PM")) PM++; else if (type.includes("CM")) CM++;
                
                let sys = (row["ระบบที่ซ่อม"] || "อื่นๆ").trim();
                systemStats[sys] = (systemStats[sys] || 0) + cost;

                let plate = (row["ทะเบียนรถ"] || "ไม่ระบุ").trim();
                if (!vehicleData[plate]) vehicleData[plate] = { count: 0, parts: 0, labor: 0, cost: 0 };
                vehicleData[plate].count++;
                vehicleData[plate].parts += parts;
                vehicleData[plate].labor += labor;
                vehicleData[plate].cost += cost;
            });

            document.getElementById("totalcost").textContent = "฿ " + totalCost.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById("totalrepaired").textContent = data.length + " ครั้ง";
            document.getElementById("BreakdownRepaired").textContent = BM;
            document.getElementById("PreventiveRepaired").textContent = PM;
            document.getElementById("CorrectiveRepaired").textContent = CM;

            updateChart(systemStats);
            updateTable(vehicleData);
        }

        function updateChart(stats) {
            let ctx = document.getElementById('systemChart').getContext('2d');
            let total = Object.values(stats).reduce((a, b) => a + b, 0);
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(stats),
                    datasets: [{
                        data: Object.values(stats),
                        backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40']
                    }]
                },
                options: {
                    plugins: {
                        datalabels: {
                            formatter: (val) => total > 0 ? (val * 100 / total).toFixed(1) + "%" : '',
                            color: '#fff', font: { weight: 'bold' }
                        }
                    }
                }
            });
        }

        function updateTable(vData) {
            let tbody = document.getElementById("vehicleTableBody");
            tbody.innerHTML = Object.keys(vData).map(p => `
                <tr>
                    <td><b>${p}</b></td>
                    <td style="text-align:center">${vData[p].count}</td>
                    <td style="color:#64748b">฿${vData[p].parts.toLocaleString()}</td>
                    <td style="color:#64748b">฿${vData[p].labor.toLocaleString()}</td>
                    <td style="color:#2563eb;font-weight:bold">฿${vData[p].cost.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        Papa.parse(SHEET_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: (res) => { rawData = res.data; renderDashboard(rawData); }
        });
    </script>
</body>
</html>
