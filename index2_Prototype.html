<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Fleet Management System RBM2 </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #334155; }
        .entry-form { background: #1e3a5f; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; margin-bottom: 5px; opacity: 0.9; }
        .form-group input, .form-group select { padding: 8px; border-radius: 4px; border: none; font-family: 'Sarabun'; }
        .submit-btn { background: #22c55e; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; transition: 0.3s; }
        .no-print { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #report-content { background: white; padding: 12mm 10mm; width: 210mm; margin: auto; min-height: 297mm; box-sizing: border-box; }
        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { border: 1px solid #e2e8f0; padding: 12px 5px; border-radius: 8px; text-align: center; background: #f8fafc; }
        .stat-value { font-size: 15px; font-weight: bold; color: #1e3a5f; }
        .chart-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; margin-bottom: 20px; }
        .chart-container { border: 1px solid #f1f5f9; padding: 10px; border-radius: 8px; height: 260px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 7px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: top; font-size: 11px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        th { background: #1e3a5f; color: white; text-align: left; }
        .col-date { width: 10%; } .col-plate { width: 12%; } .col-system { width: 15%; } .col-detail { width: 45%; } .col-cost { width: 18%; text-align: right; }
        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
        .btn-filter { padding: 5px 12px; border: 1px solid #cbd5e1; background: white; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-filter.active { background: #1e3a5f; color: white; }
    </style>
</head>
<body>

<div class="entry-form no-print">
    <h3 style="margin:0 0 15px 0">➕ บันทึกข้อมูลการซ่อมใหม่</h3>
    <div class="form-grid">
        <div class="form-group"><label>วันที่เสร็จ</label><input type="date" id="inDate"></div>
        <div class="form-group"><label>ทะเบียนรถ</label><input type="text" id="inPlate" placeholder="เช่น 83-5371"></div>
        <div class="form-group">
            <label>ระบบที่ซ่อม</label>
            <select id="inSystem">
                <option value="ระบบเครื่องยนต์">ระบบเครื่องยนต์</option>
                <option value="ระบบช่วงล่าง">ระบบช่วงล่าง</option>
                <option value="ระบบไฟฟ้า">ระบบไฟฟ้า</option>
                <option value="เช็คระยะ/PM">เช็คระยะ/PM</option>
                <option value="อื่นๆ">อื่นๆ</option>
            </select>
        </div>
        <div class="form-group">
            <label>ประเภทการซ่อม</label>
            <select id="inType">
                <option value="ซ่อมแก้ไข CM">CM (แก้ไข)</option>
                <option value="ซ่อมป้องกัน PM">PM (ป้องกัน)</option>
                <option value="Breakdown BM">BM (เสียฉุกเฉิน)</option>
            </select>
        </div>
        <div class="form-group"><label>ค่าอะไหล่ (บาท)</label><input type="number" id="inPartsCost" value="0"></div>
        <div class="form-group"><label>ค่าแรง (บาท)</label><input type="number" id="inLaborCost" value="0"></div>
    </div>
    <div class="form-group" style="margin-top:10px;">
        <label>รายละเอียดงานซ่อม / อะไหล่ที่ใช้</label>
        <input type="text" id="inDetail" placeholder="ระบุรายละเอียดงานและอะไหล่ที่เปลี่ยน">
    </div>
    <button class="submit-btn" onclick="submitData()">💾 บันทึกข้อมูลลง Google Sheets</button>
</div>

<div class="no-print">
    <button style="background:#e11d48; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; float:right;" onclick="exportPDF()">📄 บันทึกเป็น PDF</button>
    <div style="margin-bottom:15px; display:flex; gap:15px; align-items:center;">
        <div>ปี: <select id="filterYear" onchange="applyFilters()">
            <option value="2023">2023</option><option value="2024">2024</option><option value="2025">2025</option><option value="2026" selected>2026</option>
        </select></div>
        <div>ทะเบียน: <select id="filterPlate" onchange="applyFilters()"><option value="ALL">-- ทุกคัน --</option></select></div>
    </div>
    <div class="btn-group">
        <button class="btn-filter active" onclick="setRange('all', this)">ตลอดทั้งปี</button>
        <button class="btn-filter" onclick="setRange('h1', this)">ครึ่งปีแรก</button>
        <button class="btn-filter" onclick="setRange('h2', this)">ครึ่งปีหลัง</button>
        <button class="btn-filter" onclick="setRange('q1', this)">Q1</button>
        <button class="btn-filter" onclick="setRange('q2', this)">Q2</button>
        <button class="btn-filter" onclick="setRange('q3', this)">Q3</button>
        <button class="btn-filter" onclick="setRange('q4', this)">Q4</button>
    </div>
    <div class="btn-group" id="monthBtns"></div>
</div>

<div id="report-content">
    <div style="display:flex; justify-content:space-between; border-bottom:3px solid #1e3a5f; padding-bottom:10px; margin-bottom:20px;">
        <h2 style="margin:0; color:#1e3a5f;">FLEET REPAIR REPORT</h2>
        <div id="dispDate" style="text-align:right; font-size:11px; color:#64748b;"></div>
    </div>
    <div class="grid-stats">
        <div class="stat-card" style="background:#eff6ff;"><div>ยอดรวมสุทธิ</div><div class="stat-value" id="vTotal">฿0.00</div></div>
        <div class="stat-card"><div>งานซ่อม (ครั้ง)</div><div class="stat-value" id="vCount">0</div></div>
        <div class="stat-card"><div>ค่าอะไหล่</div><div class="stat-value" id="vParts">฿0.00</div></div>
        <div class="stat-card"><div>ค่าแรง</div><div class="stat-value" id="vLabor">฿0.00</div></div>
    </div>
    <div class="chart-grid">
        <div class="chart-container"><canvas id="mainChart"></canvas></div>
        <div class="chart-container" style="background:#fcfcfc;"><div id="typeStats" style="font-size:12px; line-height: 2.2;"></div></div>
    </div>
    <table>
        <thead>
            <tr>
                <th class="col-date">วันที่</th><th class="col-plate">ทะเบียน</th><th class="col-system">ระบบ</th><th class="col-detail">รายละเอียดและอะไหล่</th><th class="col-cost">ยอดรวม</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQwq0XY49ZzCMIDubKmAoCpaech2r-tSuFcZXZWKW7mVYO8gnjw5q7XHvOeyApOcY-ZZ9gJGcYTo8rH/pub?output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuH0C0XBhK949NDtBAf2KyWc28K0b-HUQLJYfN2vQxwY2rEfNFwA9PXrGEX3pkxeTF/exec'; // *** ใส่ URL ของคุณที่นี่ ***

    let rawData = [], myChart = null, currentRange = 'all';

    const monthNames = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
    const mDiv = document.getElementById('monthBtns');
    monthNames.forEach((m, i) => {
        let b = document.createElement('button'); b.className = 'btn-filter'; b.innerText = m;
        b.onclick = () => setRange(i, b); mDiv.appendChild(b);
    });

    function fetchData() {
        Papa.parse(SHEET_URL + '&cache=' + new Date().getTime(), {
            download: true, header: true, skipEmptyLines: true,
            complete: function(res) {
                rawData = res.data;
                const pSel = document.getElementById('filterPlate');
                const plates = [...new Set(rawData.map(r => r["ทะเบียนรถ"]))].filter(p => p).sort();
                pSel.innerHTML = '<option value="ALL">-- ทุกคัน --</option>';
                plates.forEach(p => pSel.innerHTML += `<option value="${p}">${p}</option>`);
                applyFilters();
            }
        });
    }

    function setRange(range, btn) {
        currentRange = range;
        document.querySelectorAll('.btn-filter').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function parseDate(d) {
        if(!d) return new Date(0);
        let p = d.split('/');
        let y = parseInt(p[2]); if(y > 2500) y -= 543;
        return new Date(y, parseInt(p[1])-1, parseInt(p[0]));
    }

    function applyFilters() {
        const year = parseInt(document.getElementById('filterYear').value);
        const plate = document.getElementById('filterPlate').value;
        let filtered = rawData.filter(row => {
            let d = parseDate(row["วันที่ซ่อมเสร็จ"]);
            let m = d.getMonth();
            let matchBase = d.getFullYear() === year && (plate === "ALL" || row["ทะเบียนรถ"] === plate);
            let matchRange = currentRange === 'all' || 
                (currentRange === 'h1' && m <= 5) || (currentRange === 'h2' && m >= 6) ||
                (currentRange === 'q1' && m <= 2) || (currentRange === 'q2' && m >= 3 && m <= 5) ||
                (currentRange === 'q3' && m >= 6 && m <= 8) || (currentRange === 'q4' && m >= 9) ||
                (typeof currentRange === 'number' && m === currentRange);
            return matchBase && matchRange;
        });
        renderData(filtered);
    }

    function renderData(data) {
        let total = 0, pTotal = 0, lTotal = 0, bm = 0, pm = 0, cm = 0;
        let sysMap = {}, html = "";
        data.forEach(row => {
            // ดึงข้อมูลให้ตรงตามหัวตารางใน Sheet (อ้างอิงจากรูปและ Apps Script)
            let p = parseFloat(String(row["ค่าอะไหล่"] || 0).replace(/,/g,'')) || 0;
            let l = parseFloat(String(row["ค่าแรง"] || 0).replace(/,/g,'')) || 0;
            let sum = p + l;
            total += sum; pTotal += p; lTotal += l;
            
            let type = (row["ประเภทการซ่อม"] || "").toUpperCase();
            if(type.includes("BM")) bm++; else if(type.includes("PM")) pm++; else if(type.includes("CM")) cm++;
            
            let sys = (row["ระบบที่ซ่อม"] || "อื่นๆ").trim();
            sysMap[sys] = (sysMap[sys] || 0) + sum;

            html += `<tr>
                <td>${row["วันที่ซ่อมเสร็จ"]}</td>
                <td><b>${row["ทะเบียนรถ"]}</b></td>
                <td>${sys}<br><span style="color:#e11d48; font-size:9px;">${type}</span></td>
                <td>${row["รายละเอียดที่ซ่อม"] || '-'}<br><span style="color:#2563eb;">อะไหล่: ${row["อะไหล่ที่ใช้"] || '-'}</span></td>
                <td align="right"><b>${sum.toLocaleString(undefined, {minimumFractionDigits:2})}</b></td>
            </tr>`;
        });
        document.getElementById('vTotal').innerText = "฿" + total.toLocaleString();
        document.getElementById('vCount').innerText = data.length;
        document.getElementById('vParts').innerText = "฿" + pTotal.toLocaleString();
        document.getElementById('vLabor').innerText = "฿" + lTotal.toLocaleString();
        document.getElementById('tableBody').innerHTML = html;
        updateChart(sysMap);
    }

    function updateChart(stats) {
        let ctx = document.getElementById('mainChart').getContext('2d');
        if(myChart) myChart.destroy();
        let sorted = Object.entries(stats).sort((a,b)=>b[1]-a[1]).slice(0, 10);
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: sorted.map(e => e[0]),
                datasets: [{ data: sorted.map(e => e[1]), backgroundColor: '#3b82f6' }]
            },
            options: {
                indexAxis: 'y', maintainAspectRatio: false,
                plugins: { legend: {display:false} }
            }
        });
    }

    function submitData() {
    const btn = document.querySelector('.submit-btn');
    const inDate = document.getElementById('inDate').value;
    const inPlate = document.getElementById('inPlate').value;

    // ตรวจสอบข้อมูลเบื้องต้น
    if(!inDate || !inPlate) { 
        alert('กรุณากรอกวันที่และทะเบียนรถให้ครบถ้วน'); 
        return; 
    }

    // จัดรูปแบบวันที่ให้ตรงกับที่ Apps Script ของคุณต้องการ (DD/MM/YYYY)
    const d = new Date(inDate);
    const formattedDate = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;

    const payload = {
        date: formattedDate,
        plate: inPlate,
        system: document.getElementById('inSystem').value,
        type: document.getElementById('inType').value,
        detail: document.getElementById('inDetail').value,
        parts_cost: document.getElementById('inPartsCost').value || 0,
        labor_cost: document.getElementById('inLaborCost').value || 0
    };

    btn.innerText = '⌛ กำลังส่งข้อมูล...';
    btn.disabled = true;

    // ใช้ fetch เพื่อส่งข้อมูลไปยัง Google Sheets
    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // โหมดนี้จำเป็นสำหรับ Google Apps Script
        cache: 'no-cache',
        body: JSON.stringify(payload)
    })
    .then(() => {
        alert('✅ บันทึกข้อมูลลง Google Sheet สำเร็จ!');
        btn.innerText = '💾 บันทึกข้อมูลลง Google Sheets';
        btn.disabled = false;
        
        // ล้างค่าในฟอร์มเพื่อให้พร้อมกรอกคันต่อไป
        document.getElementById('inPlate').value = '';
        document.getElementById('inDetail').value = '';
        document.getElementById('inPartsCost').value = '0';
        document.getElementById('inLaborCost').value = '0';
        
        // ดึงข้อมูลใหม่มาแสดงในตารางทันที
        if (typeof fetchData === "function") fetchData(); 
    })
    .catch(error => {
        console.error('Error:', error);
        alert('❌ เกิดข้อผิดพลาดในการเชื่อมต่อ');
        btn.disabled = false;
        btn.innerText = '💾 บันทึกข้อมูลลง Google Sheets';
    });
}
    function exportPDF() {
        html2pdf().from(document.getElementById('report-content')).save();
    }

    fetchData();
</script>
</body>
</html>
